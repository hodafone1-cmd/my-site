<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مخزن أبو هيبة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;font-family:'Cairo',sans-serif;direction:rtl;color:#f0ece3}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:3px}
  .card{background:#141414;border:1px solid #222;border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s}
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px #c9a84c14;border-color:#c9a84c44}
  .gbtn{background:linear-gradient(135deg,#b8922e,#e8c96a,#b8922e);background-size:200%;color:#0a0a0a;border:none;padding:11px 22px;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Cairo',sans-serif;transition:.3s;box-shadow:0 4px 16px #c9a84c44}
  .gbtn:hover{background-position:right;transform:scale(1.03)}
  .gbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .obtn{background:transparent;color:#c9a84c;border:1.5px solid #c9a84c55;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s}
  .obtn:hover{background:#c9a84c18;border-color:#c9a84c}
  .dbtn{background:transparent;color:#e05555;border:1.5px solid #e0555533;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s}
  .dbtn:hover{background:#e0555518;border-color:#e05555}
  .inp{background:#1a1a1a;border:1.5px solid #2a2a2a;color:#f0ece3;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Cairo',sans-serif;width:100%;outline:none;transition:.2s}
  .inp:focus{border-color:#c9a84c;box-shadow:0 0 0 3px #c9a84c18}
  .inp::placeholder{color:#444}
  .lbl{font-size:12px;color:#777;margin-bottom:5px;font-weight:700;display:block}
  .tab{padding:9px 14px;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border:1.5px solid #1e1e1e;background:#111;color:#555;transition:.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .tab:hover{border-color:#c9a84c33;color:#c9a84c88}
  .tab.on{background:#1a1300;border-color:#c9a84c;color:#c9a84c}
  .cnt{background:#2a2a2a;color:#777;border-radius:20px;padding:1px 7px;font-size:11px}
  .tab.on .cnt{background:#c9a84c;color:#0a0a0a}
  .overlay{position:fixed;inset:0;background:#000c;backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#141414;border:1px solid #2a2a2a;border-radius:20px;padding:26px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
  .upload{border:2px dashed #2a2a2a;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:.2s}
  .upload:hover{border-color:#c9a84c66;background:#c9a84c08}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:12px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;z-index:999;box-shadow:0 8px 32px #000a;animation:fi .2s ease;white-space:nowrap}
  @keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .spin{width:16px;height:16px;border:2px solid #c9a84c44;border-top-color:#c9a84c;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SURL = "https://xyapurglhpdonqszruku.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5YXB1cmdsaHBkb25xc3pydWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODE0NTMsImV4cCI6MjA5Mjk1NzQ1M30.0vGQVopRrQESNbER2GwMJ9Os1ta_U1lgHIjLFnTrhSE";
const CATS = ["كنترول","بطارية","كاوتش","اكسسوارات","كابلات","يد السرعة"];
const ICONS = {"كنترول":"🎮","بطارية":"🔋","كاوتش":"⭕","اكسسوارات":"✨","كابلات":"🔌","يد السرعة":"🕹️"};
const H = {"apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Content-Type":"application/json","Prefer":"return=representation"};
const EMPTY = {name:"",wholesale_price:"",retail_price:"",category:"كنترول"};

const api = async (path, opts={}) => {
  const r = await fetch(`${SURL}/rest/v1/${path}`, {headers:H,...opts});
  const t = await r.text();
  if(!r.ok) throw new Error(t);
  return t ? JSON.parse(t) : null;
};

const uploadImg = async (file) => {
  const ext = file.name.split(".").pop();
  const path = `img_${Date.now()}.${ext}`;
  const r = await fetch(`${SURL}/storage/v1/object/product-images/${path}`, {
    method:"POST",
    headers:{"apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Content-Type":file.type},
    body:file
  });
  if(!r.ok) throw new Error(await r.text());
  return `${SURL}/storage/v1/object/public/product-images/${path}`;
};

const deleteImg = async (url) => {
  if(!url) return;
  const path = url.split("/product-images/")[1];
  if(!path) return;
  await fetch(`${SURL}/storage/v1/object/product-images/${path}`, {
    method:"DELETE",
    headers:{"apikey":SKEY,"Authorization":`Bearer ${SKEY}`}
  });
};

function App() {
  const [products, setProducts] = React.useState([]);
  const [tab, setTab] = React.useState("كنترول");
  const [search, setSearch] = React.useState("");
  const [showForm, setShowForm] = React.useState(false);
  const [form, setForm] = React.useState(EMPTY);
  const [imgFile, setImgFile] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [editId, setEditId] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const fileRef = React.useRef();

  const notify = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3500); };

  const load = async () => {
    setLoading(true);
    try {
      const d = await api("products?select=*&order=created_at.desc");
      setProducts(d||[]);
    } catch(e) { notify("❌ فشل التحميل: "+e.message, false); }
    setLoading(false);
  };

  React.useEffect(()=>{ load(); },[]);

  const onImg = (e) => {
    const f = e.target.files[0]; if(!f) return;
    setImgFile(f);
    const rd = new FileReader();
    rd.onload = ev => setPreview(ev.target.result);
    rd.readAsDataURL(f);
  };

  const submit = async () => {
    if(!form.name.trim()||!form.wholesale_price||!form.retail_price) return;
    setSaving(true);
    try {
      let image_url = editId ? (products.find(p=>p.id===editId)?.image_url||null) : null;
      if(imgFile) {
        if(image_url) await deleteImg(image_url).catch(()=>{});
        image_url = await uploadImg(imgFile);
      }
      const body = {name:form.name.trim(), wholesale_price:parseFloat(form.wholesale_price), retail_price:parseFloat(form.retail_price), category:form.category, image_url};
      if(editId) {
        await api(`products?id=eq.${editId}`,{method:"PATCH",body:JSON.stringify(body)});
        notify("✅ اتعدّل بنجاح");
      } else {
        await api("products",{method:"POST",body:JSON.stringify(body)});
        notify("✅ اتضاف بنجاح");
      }
      await load(); closeForm();
    } catch(e) { notify("❌ فشل الحفظ: "+e.message, false); }
    setSaving(false);
  };

  const del = async (p) => {
    if(!confirm(`هتمسح "${p.name}"؟`)) return;
    try {
      await deleteImg(p.image_url).catch(()=>{});
      await api(`products?id=eq.${p.id}`,{method:"DELETE"});
      setProducts(ps=>ps.filter(x=>x.id!==p.id));
      notify("🗑️ اتمسح");
    } catch(e) { notify("❌ فشل الحذف: "+e.message, false); }
  };

  const edit = (p) => {
    setForm({name:p.name, wholesale_price:String(p.wholesale_price??""), retail_price:String(p.retail_price??""), category:p.category});
    setPreview(p.image_url||null); setImgFile(null); setEditId(p.id); setShowForm(true);
  };

  const openAdd = () => { setForm({...EMPTY,category:tab}); setPreview(null); setImgFile(null); setEditId(null); setShowForm(true); };
  const closeForm = () => { setShowForm(false); setEditId(null); setForm(EMPTY); setPreview(null); setImgFile(null); };

  const tabProds = products.filter(p=>p.category===tab && p.name.includes(search));

  return (
    <div style={{minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{padding:"20px 24px 16px",borderBottom:"1px solid #181818"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:52,height:52,borderRadius:"50%",border:"2px solid #c9a84c55",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🏪</div>
            <div>
              <div style={{fontSize:20,fontWeight:900}}>مخزن <span style={{background:"linear-gradient(135deg,#c9a84c,#e8c96a)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>أبو هيبة</span></div>
              <div style={{fontSize:10,color:"#444",letterSpacing:1}}>ABO HEEBA GROUP</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"center",padding:"6px 16px",background:"#141414",border:"1px solid #1e1e1e",borderRadius:10}}>
              <div style={{fontSize:20,fontWeight:900,color:"#c9a84c"}}>{products.length}</div>
              <div style={{fontSize:10,color:"#444"}}>إجمالي</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,background:"#0a1a0a",border:"1px solid #1a3a1a",borderRadius:10,padding:"6px 12px"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#4caf50",boxShadow:"0 0 6px #4caf50"}}/>
              <span style={{fontSize:11,color:"#4caf50",fontWeight:700}}>متصل</span>
            </div>
            <button className="gbtn" onClick={openAdd}>+ إضافة منتج</button>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{padding:"14px 24px 0",overflowX:"auto",borderBottom:"1px solid #141414"}}>
        <div style={{display:"flex",gap:7,paddingBottom:14,minWidth:"max-content"}}>
          {CATS.map(c=>(
            <button key={c} className={`tab ${tab===c?"on":""}`} onClick={()=>{setTab(c);setSearch("");}}>
              {ICONS[c]} {c} <span className="cnt">{products.filter(p=>p.category===c).length}</span>
            </button>
          ))}
        </div>
      </div>

      {/* BAR */}
      <div style={{padding:"14px 24px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div style={{fontWeight:800,fontSize:16}}>{ICONS[tab]} {tab} <span style={{fontSize:12,color:"#444",fontWeight:400,marginRight:8}}>({tabProds.length} منتج)</span></div>
        <input className="inp" style={{width:200,padding:"8px 14px"}} placeholder="🔍 بحث..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {/* GRID */}
      <div style={{padding:"6px 24px 40px"}} className="grid">
        {loading && <div style={{gridColumn:"1/-1",textAlign:"center",padding:60,color:"#444"}}><div className="spin" style={{width:32,height:32,margin:"0 auto 12px",borderWidth:3}}/><br/>جاري التحميل...</div>}
        {!loading && tabProds.length===0 && (
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px"}}>
            <div style={{fontSize:44,marginBottom:8}}>{ICONS[tab]}</div>
            <div style={{color:"#333",fontSize:14}}>{search?"مفيش نتايج":`مفيش منتجات في "${tab}" لسه`}</div>
            {!search && <button className="gbtn" style={{marginTop:16,fontSize:13}} onClick={openAdd}>+ أضف أول منتج</button>}
          </div>
        )}
        {!loading && tabProds.map(p=>(
          <div key={p.id} className="card">
            {p.image_url
              ? <img src={p.image_url} alt={p.name} style={{width:"100%",height:148,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>
              : <div style={{width:"100%",height:148,background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,color:"#2a2a2a"}}>{ICONS[p.category]}</div>
            }
            <div style={{padding:13}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>{p.name}</div>
              <div style={{display:"flex",gap:6,marginBottom:11}}>
                <div style={{flex:1,background:"#0d1a2a",border:"1px solid #1a3a5a",borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#4a9eff88",fontWeight:700,marginBottom:2}}>جملة</div>
                  <div style={{fontSize:15,fontWeight:900,background:"linear-gradient(135deg,#4a9eff,#7ec8ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                    {p.wholesale_price?(+p.wholesale_price).toLocaleString():"—"}<span style={{fontSize:9,opacity:.6}}> ج.م</span>
                  </div>
                </div>
                <div style={{flex:1,background:"#1a1300",border:"1px solid #3a2a00",borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#c9a84c88",fontWeight:700,marginBottom:2}}>قطاعي</div>
                  <div style={{fontSize:15,fontWeight:900,background:"linear-gradient(135deg,#c9a84c,#e8c96a)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                    {p.retail_price?(+p.retail_price).toLocaleString():"—"}<span style={{fontSize:9,opacity:.6}}> ج.م</span>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button className="obtn" style={{flex:1}} onClick={()=>edit(p)}>✏️ تعديل</button>
                <button className="dbtn" style={{flex:1}} onClick={()=>del(p)}>🗑️ حذف</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* MODAL */}
      {showForm && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget&&!saving)closeForm();}}>
          <div className="modal">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <div style={{fontSize:20}}>🏪</div>
              <div style={{fontSize:16,fontWeight:800}}>{editId?"✏️ تعديل المنتج":"➕ إضافة منتج جديد"}</div>
            </div>
            <div style={{marginBottom:14}}>
              <span className="lbl">📷 صورة المنتج (اختياري)</span>
              <div className="upload" onClick={()=>fileRef.current.click()}>
                {preview ? <img src={preview} alt="" style={{width:"100%",height:110,objectFit:"cover",borderRadius:8}}/> : <div style={{color:"#444",fontSize:13,padding:"10px 0"}}>اضغط لرفع صورة</div>}
              </div>
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onImg}/>
            </div>
            <div style={{marginBottom:12}}>
              <span className="lbl">📝 اسم المنتج *</span>
              <input className="inp" placeholder="اسم المنتج" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <div style={{flex:1}}>
                <span className="lbl">🔵 سعر الجملة *</span>
                <input className="inp" placeholder="200" type="number" value={form.wholesale_price} onChange={e=>setForm(f=>({...f,wholesale_price:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <span className="lbl">🟡 سعر القطاعي *</span>
                <input className="inp" placeholder="350" type="number" value={form.retail_price} onChange={e=>setForm(f=>({...f,retail_price:e.target.value}))}/>
              </div>
            </div>
            <div style={{marginBottom:22}}>
              <span className="lbl">📂 النوع *</span>
              <select className="inp" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {CATS.map(c=><option key={c} value={c}>{ICONS[c]} {c}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:9}}>
              <button className="gbtn" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}
                onClick={submit} disabled={saving||!form.name.trim()||!form.wholesale_price||!form.retail_price}>
                {saving?<><span className="spin"/>جاري الحفظ...</>:editId?"💾 حفظ التعديلات":"✅ إضافة المنتج"}
              </button>
              <button className="obtn" onClick={closeForm} disabled={saving}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className="toast" style={{background:toast.ok?"#0d1a0d":"#1a0d0d",border:`1px solid ${toast.ok?"#2a5a2a":"#5a2a2a"}`,color:toast.ok?"#4caf50":"#e05555"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
